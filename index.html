<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
<title>CHIT-CHAT</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #1a1c2c;
  --panel:  #16213e;
  --border: #4a4e8c;
  --px:     2px;
  --cyan:   #41ffe0;
  --yellow: #ffd860;
  --pink:   #ff6b9d;
  --green:  #5cff8c;
  --purple: #b48ef4;
  --red:    #ff5555;
  --white:  #e8f0ff;
  --dim:    #4a5080;
  --own-bg: #1e1040;
  --other-bg:#0d1f35;
}

/* ── PIXEL BORDER MIXIN via box-shadow ── */
* { box-sizing: border-box; margin: 0; padding: 0; image-rendering: pixelated; }

body {
  font-family: 'VT323', monospace;
  background: var(--bg);
  color: var(--white);
  height: 100vh; height: 100dvh;
  overflow: hidden;
  background-image:
    radial-gradient(circle at 20% 20%, rgba(65,255,224,.04) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(180,142,244,.04) 0%, transparent 50%);
}

/* Pixel border utility — 4-side 2px hard border */
.px-box {
  border: var(--px) solid var(--border);
  box-shadow:
    inset var(--px) var(--px) 0 rgba(255,255,255,.07),
    inset calc(-1*var(--px)) calc(-1*var(--px)) 0 rgba(0,0,0,.3);
}

/* ── SCREENS ── */
.screen {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  transition: opacity .2s;
}
.screen.hidden { opacity: 0; pointer-events: none; }

/* ── LOGIN ── */
.login-wrap { width: 100%; max-width: 440px; padding: 20px; }

.login-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 18px;
  color: var(--cyan);
  text-align: center;
  text-shadow: 0 0 20px var(--cyan), 0 0 40px rgba(65,255,224,.3);
  margin-bottom: 6px;
  letter-spacing: 2px;
}
.login-sub {
  font-size: 18px;
  color: var(--dim);
  text-align: center;
  margin-bottom: 28px;
}

.login-card {
  background: var(--panel);
  border: var(--px) solid var(--border);
  box-shadow:
    4px 4px 0 #0a0c1a,
    inset 1px 1px 0 rgba(255,255,255,.05);
  padding: 24px;
}

/* pixel titlebar */
.card-bar {
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  background: var(--border);
  color: var(--bg);
  padding: 6px 10px;
  margin: -24px -24px 20px;
  display: flex; justify-content: space-between; align-items: center;
  letter-spacing: .05em;
}
.card-bar-dots { display: flex; gap: 5px; }
.card-bar-dot { width: 8px; height: 8px; background: var(--bg); border: 1px solid rgba(0,0,0,.4); }

.field-label {
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  color: var(--yellow);
  letter-spacing: .08em;
  margin-bottom: 8px;
  display: block;
}

.field-input {
  width: 100%;
  background: #0d0f1e;
  border: var(--px) solid var(--border);
  box-shadow: inset 2px 2px 0 rgba(0,0,0,.5);
  color: var(--cyan);
  font-family: 'VT323', monospace;
  font-size: 22px;
  padding: 10px 12px;
  outline: none;
  caret-color: var(--cyan);
  transition: border-color .15s;
}
.field-input::placeholder { color: var(--dim); }
.field-input:focus { border-color: var(--cyan); box-shadow: inset 2px 2px 0 rgba(0,0,0,.5), 0 0 0 2px rgba(65,255,224,.2); }
.field-input.err { border-color: var(--red); color: var(--red); }

.err-msg { font-size: 16px; color: var(--red); margin-top: 6px; display: none; }

.login-btn {
  width: 100%; margin-top: 20px;
  background: var(--cyan);
  border: none;
  box-shadow: 4px 4px 0 #1a6a5e, inset 0 -2px 0 rgba(0,0,0,.3);
  color: #0a1a18;
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  padding: 14px;
  cursor: pointer;
  letter-spacing: .1em;
  transition: transform .08s, box-shadow .08s;
  text-transform: uppercase;
}
.login-btn:hover { background: #6ffff0; }
.login-btn:active { transform: translate(3px, 3px); box-shadow: 1px 1px 0 #1a6a5e; }

.login-note { text-align: center; margin-top: 14px; font-size: 14px; color: var(--dim); }
.login-note b { color: var(--green); }

/* ── CHAT LAYOUT ── */
.chat-layout { display: flex; flex-direction: column; height: 100vh; height: 100dvh; width: 100%; }

/* Header */
.chat-header {
  background: var(--panel);
  border-bottom: var(--px) solid var(--border);
  box-shadow: 0 2px 0 #0a0c1a;
  padding: 0 14px;
  height: 48px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}

.hdr-left { display: flex; align-items: center; gap: 10px; }
.hdr-logo {
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  color: var(--cyan);
  text-shadow: 0 0 10px var(--cyan);
  letter-spacing: 1px;
}
.hdr-online {
  font-size: 14px;
  color: var(--dim);
  display: flex; align-items: center; gap: 6px;
}
.hdr-online .dot {
  width: 6px; height: 6px;
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
  animation: blink 1.4s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

.hdr-right { display: flex; align-items: center; gap: 8px; }
.user-tag {
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  color: var(--yellow);
  background: rgba(255,216,96,.08);
  border: 1px solid rgba(255,216,96,.25);
  padding: 5px 9px;
  cursor: pointer;
  transition: background .1s;
  letter-spacing: .05em;
  display: flex; align-items: center; gap: 6px;
  white-space: nowrap; max-width: 140px; overflow: hidden;
}
.user-tag:hover { background: rgba(255,216,96,.15); }
.user-tag .tag-icon { color: var(--pink); flex-shrink: 0; }

/* Conn banner */
.conn-banner {
  background: #3d0f0f; border-bottom: 2px solid var(--red);
  color: var(--red); text-align: center; padding: 7px;
  font-family: 'Press Start 2P', monospace; font-size: 7px;
  display: none; flex-shrink: 0; letter-spacing: .05em;
}
.conn-banner.show { display: block; }

/* Messages */
.msgs-area {
  flex: 1; overflow-y: auto;
  padding: 12px 14px 8px;
  display: flex; flex-direction: column; gap: 1px;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.msgs-area::-webkit-scrollbar { width: 4px; }
.msgs-area::-webkit-scrollbar-thumb { background: var(--border); }

.msg-sys {
  font-size: 13px; color: var(--dim);
  text-align: center; padding: 5px 0;
  border-top: 1px dashed var(--dim);
  border-bottom: 1px dashed var(--dim);
  margin: 4px 0;
}

.msg-date {
  text-align: center; font-size: 12px;
  color: var(--dim); margin: 10px 0 4px;
  display: flex; align-items: center; gap: 8px;
}
.msg-date::before, .msg-date::after {
  content: ''; flex: 1;
  border-top: 1px dashed var(--dim);
}

.msg-row {
  display: flex; align-items: flex-end; gap: 8px;
  padding: 3px 0;
}
.msg-row.own { flex-direction: row-reverse; }

.msg-avatar {
  width: 28px; height: 28px;
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  display: flex; align-items: center; justify-content: center;
  color: #0a0c1a;
  flex-shrink: 0;
  border: 2px solid rgba(255,255,255,.15);
  box-shadow: 2px 2px 0 rgba(0,0,0,.4);
}

.msg-body { display: flex; flex-direction: column; gap: 3px; max-width: 74%; }
.msg-row.own .msg-body { align-items: flex-end; }

.msg-meta { display: flex; align-items: baseline; gap: 8px; padding: 0 2px; }
.msg-row.own .msg-meta { flex-direction: row-reverse; }
.msg-name { font-family: 'Press Start 2P', monospace; font-size: 6px; letter-spacing: .05em; }
.msg-time { font-size: 12px; color: var(--dim); }

.msg-bubble {
  padding: 8px 12px;
  font-size: 18px;
  line-height: 1.4;
  word-break: break-word;
  border: var(--px) solid transparent;
  position: relative;
}

.msg-row.other .msg-bubble {
  background: var(--other-bg);
  border-color: var(--border);
  box-shadow: 3px 3px 0 rgba(0,0,0,.4);
  color: var(--white);
  border-bottom-left-radius: 0;
}
.msg-row.own .msg-bubble {
  background: var(--own-bg);
  border-color: var(--purple);
  box-shadow: 3px 3px 0 rgba(0,0,0,.4);
  color: var(--yellow);
  border-bottom-right-radius: 0;
}

/* Bubble wrap for hover toolbar */
.bubble-wrap { position: relative; display: inline-block; max-width: 100%; }

/* Reaction toolbar on hover */
.react-toolbar {
  position: absolute;
  bottom: calc(100% + 4px);
  left: 0;
  background: var(--panel);
  border: 1px solid var(--border);
  box-shadow: 3px 3px 0 #0a0c1a;
  padding: 4px 6px;
  display: flex; gap: 2px;
  opacity: 0; pointer-events: none;
  transition: opacity .15s;
  white-space: nowrap;
  z-index: 50;
}
.msg-row.own .react-toolbar { left: auto; right: 0; }

/* Bridge gap between bubble and toolbar so hover doesn't break */
.react-toolbar::after {
  content: '';
  position: absolute;
  top: 100%;
  left: 0; right: 0;
  height: 8px;
}

.bubble-wrap:hover .react-toolbar,
.react-toolbar:hover { opacity: 1; pointer-events: all; }

.react-quick-btn {
  width: 26px; height: 26px;
  border: none; background: none; cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: background .1s; border-radius: 2px;
}
.react-quick-btn:hover { background: var(--surface2); }

/* More emoji button in toolbar */
.react-more-btn {
  width: 26px; height: 26px;
  border: none; background: none; cursor: pointer;
  font-size: 12px; color: var(--dim);
  display: flex; align-items: center; justify-content: center;
  border-left: 1px solid var(--border); margin-left: 2px;
  padding-left: 4px;
  transition: color .1s;
}
.react-more-btn:hover { color: var(--cyan); }

/* Reaction pills */
.reactions-row {
  display: flex; flex-wrap: wrap; gap: 4px;
  padding: 2px 0 0;
}

.react-pill {
  display: flex; align-items: center; gap: 3px;
  padding: 2px 7px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,.04);
  font-size: 13px; cursor: pointer;
  transition: background .1s, border-color .1s;
  position: relative;
}
.react-pill:hover { background: rgba(255,255,255,.08); }
.react-pill.mine { border-color: var(--purple); background: rgba(180,142,244,.12); }
.react-pill .pill-count { font-size: 12px; color: var(--dim); font-family: 'VT323', monospace; }
.react-pill.mine .pill-count { color: var(--purple); }

/* Tooltip who reacted */
.react-pill .react-tooltip {
  position: absolute;
  bottom: calc(100% + 5px);
  left: 50%; transform: translateX(-50%);
  background: #0a0c1a;
  border: 1px solid var(--border);
  box-shadow: 2px 2px 0 rgba(0,0,0,.5);
  color: var(--white);
  font-size: 11px;
  padding: 4px 8px;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity .15s;
  z-index: 60;
  font-family: 'VT323', monospace;
  letter-spacing: .03em;
}
.react-pill:hover .react-tooltip { opacity: 1; }

/* Emoji picker popup */
.emoji-picker {
  position: fixed;
  background: var(--panel);
  border: 1px solid var(--border);
  box-shadow: 4px 4px 0 #0a0c1a;
  padding: 8px;
  z-index: 500;
  display: none;
}
.emoji-picker.show { display: block; }
.picker-grid {
  display: grid;
  grid-template-columns: repeat(8, 30px);
  gap: 2px;
}
.picker-em {
  width: 30px; height: 30px;
  border: none; background: none; cursor: pointer;
  font-size: 17px;
  display: flex; align-items: center; justify-content: center;
  transition: background .08s;
}
.picker-em:hover { background: rgba(255,255,255,.08); }

/* Emoji button in input row */
.gif-bubble {
  max-width: 200px; border-radius: 4px; overflow: hidden;
  border: 2px solid var(--border); box-shadow: 3px 3px 0 rgba(0,0,0,.4);
  cursor: pointer;
}
.gif-bubble img { width: 100%; display: block; }

.gif-grid-item {
  position: absolute;
  overflow: hidden; cursor: pointer;
  border: 1px solid #4a4e8c; background: #0d0f1e;
  transition: border-color .1s;
}
.gif-grid-item:hover { border-color: #41ffe0; }
.gif-grid-item img { width: 100%; height: auto; display: block; }

#gifGrid {
  scrollbar-width: thin;
  scrollbar-color: #4a4e8c #0d0f1e;
}
#gifGrid::-webkit-scrollbar { width: 4px; }
#gifGrid::-webkit-scrollbar-track { background: #0d0f1e; }
#gifGrid::-webkit-scrollbar-thumb { background: #4a4e8c; }
#gifGrid::-webkit-scrollbar-thumb:hover { background: #41ffe0; }

.emoji-input-btn {
  background: none;
  border: none; border-left: var(--px) solid var(--border);
  color: var(--dim);
  font-size: 18px; padding: 0 10px;
  cursor: pointer; flex-shrink: 0;
  transition: color .1s;
  display: flex; align-items: center;
}
.emoji-input-btn:hover { color: var(--yellow); }

/* Typing */
.typing-bar {
  padding: 3px 14px 5px;
  font-size: 14px; color: var(--dim);
  min-height: 20px; flex-shrink: 0;
}

/* Input */
.input-area {
  background: var(--panel);
  border-top: var(--px) solid var(--border);
  box-shadow: 0 -2px 0 #0a0c1a;
  padding: 10px 12px 12px;
  flex-shrink: 0; position: sticky; bottom: 0;
}
.input-row {
  display: flex; align-items: stretch; gap: 0;
  border: var(--px) solid var(--border);
  box-shadow: 3px 3px 0 #0a0c1a;
  background: #0d0f1e;
}
.input-prompt {
  font-family: 'Press Start 2P', monospace;
  font-size: 8px; color: var(--cyan);
  padding: 0 10px;
  display: flex; align-items: center;
  flex-shrink: 0;
  border-right: var(--px) solid var(--border);
  background: rgba(65,255,224,.05);
}
.chat-input {
  flex: 1; background: transparent; border: none; outline: none;
  font-family: 'VT323', monospace; font-size: 20px;
  color: var(--white); padding: 10px 10px;
  caret-color: var(--cyan); min-width: 0;
}
.chat-input::placeholder { color: var(--dim); }
.chat-input:disabled { opacity: .5; }

.send-btn {
  background: var(--cyan);
  border: none; border-left: var(--px) solid var(--border);
  color: #0a1a18;
  font-family: 'Press Start 2P', monospace;
  font-size: 7px; padding: 0 14px;
  cursor: pointer; letter-spacing: .05em;
  transition: background .1s, transform .08s;
  flex-shrink: 0;
  box-shadow: inset 0 -2px 0 rgba(0,0,0,.25);
}
.send-btn:hover { background: #6ffff0; }
.send-btn:active { transform: translate(1px,1px); }
.send-btn:disabled { opacity: .4; cursor: default; }

.input-hint { font-size: 12px; color: var(--dim); margin-top: 6px; text-align: center; }

/* New msg badge */
.new-badge {
  position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%);
  background: var(--pink); color: #1a0010;
  font-family: 'Press Start 2P', monospace; font-size: 7px;
  padding: 8px 16px; cursor: pointer; z-index: 100;
  box-shadow: 3px 3px 0 #5a0030;
  white-space: nowrap;
  animation: popIn .15s ease;
}
@keyframes popIn { from { transform: translateX(-50%) scale(.8); opacity: 0; } }

/* Toast */
.toast-wrap { position: fixed; bottom: 84px; right: 14px; display: flex; flex-direction: column; gap: 6px; z-index: 200; }
.toast {
  background: var(--panel); border: 2px solid var(--yellow);
  color: var(--yellow); padding: 9px 14px;
  font-family: 'Press Start 2P', monospace; font-size: 7px;
  box-shadow: 3px 3px 0 rgba(0,0,0,.5);
  letter-spacing: .04em; line-height: 1.6;
}

/* Modal */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(10,12,26,.85);
  display: flex; align-items: center; justify-content: center;
  z-index: 300; opacity: 0; pointer-events: none;
  transition: opacity .15s; padding: 20px;
}
.modal-bg.show { opacity: 1; pointer-events: all; }
.modal-box {
  background: var(--panel);
  border: var(--px) solid var(--border);
  box-shadow: 6px 6px 0 #0a0c1a;
  padding: 0; width: 100%; max-width: 360px;
  transform: scale(.95); transition: transform .15s;
}
.modal-bg.show .modal-box { transform: scale(1); }
.modal-bar {
  font-family: 'Press Start 2P', monospace; font-size: 7px;
  background: var(--purple); color: #0a0c1a;
  padding: 7px 12px;
  display: flex; justify-content: space-between;
  letter-spacing: .05em;
}
.modal-body { padding: 20px; }
.modal-title { font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--yellow); margin-bottom: 4px; letter-spacing: .06em; }
.modal-sub { font-size: 14px; color: var(--dim); margin-bottom: 16px; }
.modal-actions { display: flex; gap: 8px; margin-top: 16px; }
.btn-cancel {
  flex: 1; padding: 10px;
  background: transparent; border: 2px solid var(--dim);
  color: var(--dim); font-family: 'Press Start 2P', monospace;
  font-size: 7px; cursor: pointer; letter-spacing: .05em;
  transition: border-color .1s, color .1s;
}
.btn-cancel:hover { border-color: var(--white); color: var(--white); }
.btn-confirm {
  flex: 1; padding: 10px;
  background: var(--purple); border: none;
  box-shadow: 3px 3px 0 #3a2060;
  color: #0a0c1a; font-family: 'Press Start 2P', monospace;
  font-size: 7px; cursor: pointer; letter-spacing: .05em;
  transition: background .1s, transform .08s;
}
.btn-confirm:hover { background: #c8a8ff; }
.btn-confirm:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 #3a2060; }

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  .login-title { font-size: 13px; }
  .hdr-logo { font-size: 7px; }
  .hdr-online { display: none; }
  .msg-body { max-width: 84%; }
  .msg-bubble { font-size: 16px; padding: 7px 10px; }
  .input-hint { display: none; }
  .user-tag { max-width: 100px; font-size: 6px; }
}
@media (max-width: 380px) {
  .msg-avatar { display: none; }
  .msg-body { max-width: 92%; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="screen" id="loginScreen">
  <div class="login-wrap">
    <div class="login-title">CHIT-CHAT</div>
    <div class="login-sub">▸ anonymous chat room ◂</div>
    <div class="login-card">
      <div class="card-bar">
        <span>LOGIN.EXE</span>
        <div class="card-bar-dots">
          <div class="card-bar-dot"></div>
          <div class="card-bar-dot"></div>
          <div class="card-bar-dot"></div>
        </div>
      </div>
      <label class="field-label" for="uInput">▸ ENTER YOUR NAME</label>
      <input class="field-input" id="uInput" type="text" placeholder="PLAYER_ONE" maxlength="20" autocomplete="off" spellcheck="false" autocorrect="off"/>
      <div class="err-msg" id="loginErr"></div>
      <button class="login-btn" id="loginBtn">▸ START GAME ◂</button>
    </div>
    <div class="login-note">[ 🔒 NO IP STORED · <b>ANONYMOUS</b> ]</div>
  </div>
</div>

<!-- CHAT -->
<div class="screen hidden" id="chatScreen">
  <div class="chat-layout">

    <div class="chat-header">
      <div class="hdr-left">
        <div class="hdr-logo">CHIT-CHAT</div>
        <div class="hdr-online">
          <div class="dot"></div>
          <span id="onlineCount">0</span> online
        </div>
      </div>
      <div class="hdr-right">
        <div class="user-tag" id="userTag" title="Đổi tên">
          <span class="tag-icon">▸</span>
          <span id="headerUser">...</span>
        </div>
      </div>
    </div>

    <div class="conn-banner" id="connBanner">!! DISCONNECTED — RECONNECTING ...</div>

    <div class="msgs-area" id="msgsList"></div>

    <div class="typing-bar" id="typBar"></div>

    <div class="input-area">
      <div class="input-row">
        <div class="input-prompt">▸</div>
        <input class="chat-input" id="msgInput" type="text" placeholder="type your message..." maxlength="500" autocomplete="off" spellcheck="false"/>
        <button class="emoji-input-btn" id="gifInputBtn" title="GIF" style="font-size:11px;font-family:'Press Start 2P',monospace;letter-spacing:0;padding:0 8px;width:auto">GIF</button>
        <button class="emoji-input-btn" id="emojiInputBtn" title="Emoji">😊</button>
        <button class="send-btn" id="sendBtn">SEND</button>
      </div>
      <div class="input-hint">/nick NAME để đổi tên &nbsp;·&nbsp; <span id="onlineCount2">0</span> người online</div>
    </div>

  </div>
</div>

<!-- GIF PICKER -->
<div id="gifPicker" style="
  display:none; position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
  width:min(360px, 96vw);
  background:#1a1c2c; border:1px solid #4a4e8c;
  box-shadow:4px 4px 0 #0a0c1a; z-index:400;
">
  <div style="padding:8px;border-bottom:1px solid #4a4e8c;display:flex;gap:6px;align-items:center">
    <input id="gifSearch" type="text" placeholder="Search GIFs..." style="
      flex:1;background:#0d0f1e;border:1px solid #4a4e8c;color:#e8f0ff;
      font-family:'VT323',monospace;font-size:18px;padding:6px 10px;outline:none;
    "/>
    <button id="gifClose" style="background:none;border:none;color:#4a5080;font-size:18px;cursor:pointer;padding:0 4px">✕</button>
  </div>
  <div id="gifGrid" style="
    position:relative;
    padding:6px;max-height:260px;overflow-y:auto;
  "></div>
  <div style="text-align:center;padding:5px;font-size:11px;color:#4a5080;font-family:'VT323',monospace">
    Powered by GIPHY
  </div>
</div>

<!-- RENAME MODAL -->
<div class="modal-bg" id="rModal">
  <div class="modal-box">
    <div class="modal-bar">
      <span>RENAME PLAYER</span><span>✕</span>
    </div>
    <div class="modal-body">
      <div class="modal-title">NEW NAME</div>
      <div class="modal-sub">Tên mới sẽ hiện với mọi người</div>
      <label class="field-label" for="rInput">▸ ENTER NAME</label>
      <input class="field-input" id="rInput" type="text" placeholder="NEW_NAME" maxlength="20" autocomplete="off" spellcheck="false"/>
      <div class="err-msg" id="rErr"></div>
      <div class="modal-actions">
        <button class="btn-cancel" id="cancelBtn">CANCEL</button>
        <button class="btn-confirm" id="confirmBtn">CONFIRM</button>
      </div>
    </div>
  </div>
</div>

<div class="emoji-picker" id="emojiPicker">
  <div class="picker-grid" id="pickerGrid"></div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmt=d=>d.toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'});

let user='',ws=null,wsOk=false,rcTimer=null,typTimer=null;
let typClear={},typActive=new Set(),atBottom=true,newCount=0;
let client_joined=false; // true sau khi server confirm join thành công (nhận history)
const WS=`${location.protocol==='https:'?'wss':'ws'}://${location.host}`;

const AVATAR_COLORS=['#41ffe0','#ff6b9d','#5cff8c','#ffd860','#b48ef4','#4facfe','#fa709a','#f7971e'];
function avatarColor(n){let h=0;for(const c of n)h=(h*31+c.charCodeAt(0))&0xffff;return AVATAR_COLORS[h%AVATAR_COLORS.length]}
function avatarLetter(n){return(n||'?')[0].toUpperCase()}

// ── AUDIO ──
let _actx=null,_audioUnlocked=false;
function _initCtx(){if(!_actx)_actx=new(window.AudioContext||window.webkitAudioContext)();}
async function unlockAudio(){
  try{
    _initCtx();
    if(_actx.state==='suspended')await _actx.resume();
    const buf=_actx.createBuffer(1,1,22050);
    const src=_actx.createBufferSource();
    src.buffer=buf;src.connect(_actx.destination);src.start(0);
    _audioUnlocked=true;
  }catch(_){}
}
function beep8(notes){
  if(!_actx||!_audioUnlocked)return;
  try{
    notes.forEach(([f,t,d])=>{
      const o=_actx.createOscillator(),g=_actx.createGain();
      o.connect(g);g.connect(_actx.destination);
      o.type='square';o.frequency.value=f;
      g.gain.setValueAtTime(.05,_actx.currentTime+t);
      g.gain.setValueAtTime(.001,_actx.currentTime+t+d);
      o.start(_actx.currentTime+t);o.stop(_actx.currentTime+t+d+.01);
    });
  }catch(_){}
}
const pNotif=()=>beep8([[880,.0,.05],[1047,.06,.05]]);
const pJoin =()=>beep8([[262,.0,.08],[330,.09,.08],[392,.18,.08],[523,.27,.12]]);
const pSend =()=>beep8([[660,.0,.04],[880,.05,.04]]);

const EMOJIS=['😀','😂','🥹','😍','🤔','😅','😭','🥰','😎','🤯','😱','🥳','😤','🤗','😴','🤩','👍','👎','❤️','🔥','✨','💯','🎉','👏','🙌','💪','🫡','👀','🫂','💀','😈','🤡','🐸','💎','🚀','⚡','🌈','🍀'];
const QUICK_REACTS=['👍','❤️','😂','😮','😢','🔥','🎉','💯'];

let pickerTarget=null; // 'input' | {msgId}

function buildPicker(){
  const grid=document.getElementById('pickerGrid');
  EMOJIS.forEach(em=>{
    const btn=document.createElement('button');
    btn.className='picker-em';btn.textContent=em;
    btn.onclick=e=>{
      e.stopPropagation();
      if(pickerTarget==='input'){
        const inp=document.getElementById('msgInput');
        inp.value+=em;inp.focus();
      } else if(pickerTarget!==null){
        sendReact(pickerTarget,em);
      }
      closePicker();
    };
    grid.appendChild(btn);
  });
}

function openPicker(target,refEl){
  pickerTarget=target;
  const picker=document.getElementById('emojiPicker');
  const rect=refEl.getBoundingClientRect();
  picker.style.bottom=(window.innerHeight-rect.top+6)+'px';
  picker.style.left=Math.min(rect.left,window.innerWidth-260)+'px';
  picker.style.right='auto';
  picker.classList.add('show');
}

function closePicker(){
  document.getElementById('emojiPicker').classList.remove('show');
  pickerTarget=null;
}

const saveU=n=>{try{localStorage.setItem('cc_nick',n)}catch(_){}};
const loadU=()=>{try{return localStorage.getItem('cc_nick')||''}catch(_){return''}};

window.onload=()=>{
  buildPicker();
  const sv=loadU();if(sv)document.getElementById('uInput').value=sv;
  document.getElementById('loginBtn').addEventListener('click',enterChat);
  document.getElementById('uInput').addEventListener('keydown',e=>{if(e.key==='Enter')enterChat()});
  document.getElementById('userTag').addEventListener('click',openRename);
  document.getElementById('cancelBtn').addEventListener('click',closeRename);
  document.getElementById('confirmBtn').addEventListener('click',confirmRename);
  document.getElementById('msgInput').addEventListener('keydown',e=>{if(e.key==='Enter'){doSend();return}});
  document.getElementById('msgInput').addEventListener('input',onType);
  document.getElementById('rInput').addEventListener('keydown',e=>{if(e.key==='Enter')confirmRename()});
  document.getElementById('rModal').addEventListener('click',e=>{if(e.target.id==='rModal')closeRename()});
  document.getElementById('msgsList').addEventListener('scroll',function(){
    atBottom=this.scrollTop+this.clientHeight>=this.scrollHeight-80;
    if(atBottom){newCount=0;rmBadge()}
  });
  document.getElementById('sendBtn').addEventListener('touchend',e=>{e.preventDefault();doSend();},{passive:false});
  document.getElementById('sendBtn').addEventListener('click',doSend);
  document.getElementById('emojiInputBtn').addEventListener('click',e=>{
    e.stopPropagation();
    if(pickerTarget==='input'){closePicker();return;}
    openPicker('input',e.currentTarget);
  });
  document.getElementById('gifInputBtn').addEventListener('click', e=>{
    e.stopPropagation();
    const picker = document.getElementById('gifPicker');
    const isOpen = picker.style.display !== 'none';
    if(isOpen){ picker.style.display='none'; return; }
    picker.style.display='block';
    loadGifs('');
    setTimeout(()=>document.getElementById('gifSearch').focus(), 50);
  });
  document.getElementById('gifClose').addEventListener('click', ()=>{
    document.getElementById('gifPicker').style.display='none';
  });
  let gifSearchTimer=null;
  document.getElementById('gifSearch').addEventListener('input', e=>{
    clearTimeout(gifSearchTimer);
    gifSearchTimer=setTimeout(()=>loadGifs(e.target.value.trim()), 400);
  });
  document.getElementById('gifPicker').addEventListener('click', e=>e.stopPropagation());
  document.addEventListener('click', ()=>{ document.getElementById('gifPicker').style.display='none'; });
  document.addEventListener('click',closePicker);
  document.getElementById('emojiPicker').addEventListener('click',e=>e.stopPropagation());
  document.addEventListener('touchend',unlockAudio,{once:true});
  document.addEventListener('touchstart',unlockAudio,{once:true});
};

function sendReact(msgId,emoji){
  if(!wsOk||!msgId)return;
  ws.send(JSON.stringify({type:'react',msgId:Number(msgId),emoji}));
}

function renderReactions(container, reactions, msgId){
  container.innerHTML='';
  Object.entries(reactions||{}).forEach(([emoji,users])=>{
    if(!users.length)return;
    const mine=users.some(u=>u.toLowerCase()===user.toLowerCase());
    const pill=document.createElement('div');
    pill.className=`react-pill${mine?' mine':''}`;

    const tip=document.createElement('div');
    tip.className='react-tooltip';
    tip.textContent=users.join(', ');

    const em=document.createElement('span');em.textContent=emoji;
    const cnt=document.createElement('span');cnt.className='pill-count';cnt.textContent=users.length;
    pill.appendChild(tip);pill.appendChild(em);pill.appendChild(cnt);
    pill.onclick=e=>{e.stopPropagation();sendReact(msgId,emoji);};
    container.appendChild(pill);
  });
}

function renderGifs(data){
  const grid=document.getElementById('gifGrid');
  grid.innerHTML='';
  if(!data||!data.length){
    grid.style.position='relative';grid.style.height='auto';
    grid.innerHTML='<div style="color:#4a5080;font-size:14px;padding:20px;text-align:center">Không tìm thấy GIF</div>';
    return;
  }

  const COLS=3, GAP=3;
  const colW=(grid.clientWidth - GAP*(COLS-1)) / COLS;
  const colHeights=Array(COLS).fill(0);
  let loaded=0;

  grid.style.position='relative';

  data.forEach(gif=>{
    const url=gif.images.fixed_height_small.url;
    const fullUrl=gif.images.downsized_medium?.url||gif.images.original.url;
    const nativeW=Number(gif.images.fixed_height_small.width)||100;
    const nativeH=Number(gif.images.fixed_height_small.height)||100;
    const scaledH=Math.round((nativeH/nativeW)*colW);

    const shortCol=colHeights.indexOf(Math.min(...colHeights));
    const x=shortCol*(colW+GAP);
    const y=colHeights[shortCol];

    const item=document.createElement('div');
    item.className='gif-grid-item';
    item.style.cssText=`left:${x}px;top:${y}px;width:${colW}px;`;

    const img=document.createElement('img');
    img.src=url;img.loading='lazy';img.alt='';
    img.style.height=scaledH+'px';

    item.appendChild(img);
    item.onclick=()=>{
      sendGif(fullUrl);
      document.getElementById('gifPicker').style.display='none';
      document.getElementById('gifSearch').value='';
    };
    grid.appendChild(item);
    colHeights[shortCol]+=scaledH+GAP;
    grid.style.height=Math.max(...colHeights)+'px';
  });
}

function loadGifs(q){
  const grid=document.getElementById('gifGrid');
  grid.style.height='60px';
  grid.innerHTML='<div style="color:#4a5080;font-size:14px;padding:20px;text-align:center">Loading...</div>';
  fetch(`/api/giphy?q=${encodeURIComponent(q)}`)
    .then(r=>r.json())
    .then(data=>{
      if(data.data) renderGifs(data.data);
      else renderGifs([]);
    })
    .catch(()=>{
      grid.style.height='auto';
      grid.innerHTML='<div style="color:#ff5555;font-size:14px;padding:20px;text-align:center">Lỗi tải GIF</div>';
    });
}

function sendGif(url){
  if(!wsOk)return;
  ws.send(JSON.stringify({type:'message', message:url, subtype:'gif'}));
  pSend();
}

function valNick(n){
  n=n.trim();
  if(!n)return'Tên không được để trống';
  if(n.length<2)return'Tên phải có ít nhất 2 ký tự';
  if(n.length>20)return'Tên tối đa 20 ký tự';
  return null;
}

function setAvatar(elId,name){
  const el=document.getElementById(elId);
  if(!el)return;
  el.textContent=avatarLetter(name);
  el.style.background=avatarColor(name);
}

async function enterChat(){
  const raw=document.getElementById('uInput').value;
  const err=valNick(raw);
  const ee=document.getElementById('loginErr'),ie=document.getElementById('uInput');
  if(err){ee.textContent=err;ee.style.display='block';ie.classList.add('err');return}
  ee.style.display='none';ie.classList.remove('err');
  user=raw.trim();saveU(user);
  document.getElementById('headerUser').textContent=user;
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('chatScreen').classList.remove('hidden');
  connectWS();
  await unlockAudio();
  pJoin();
}

function connectWS(){
  if(ws){try{ws.close()}catch(_){}}
  client_joined=false;
  ws=new WebSocket(WS);
  ws.addEventListener('open',()=>{
    wsOk=true;setConn(true);
    ws.send(JSON.stringify({type:'join',username:user}));
    if(rcTimer){clearTimeout(rcTimer);rcTimer=null}
  });
  ws.addEventListener('message',e=>{let m;try{m=JSON.parse(e.data)}catch{return}onMsg(m)});
  ws.addEventListener('close',()=>{wsOk=false;setConn(false);schedRC()});
  ws.addEventListener('error',()=>{wsOk=false;setConn(false)});
}
function schedRC(){if(rcTimer)return;rcTimer=setTimeout(()=>{rcTimer=null;connectWS()},3000)}
function setConn(ok){
  document.getElementById('connBanner').classList.toggle('show',!ok);
  document.getElementById('msgInput').disabled=!ok;
  document.getElementById('sendBtn').disabled=!ok;
}

function onMsg(m){
  switch(m.type){
    case'history':
      client_joined=true;
      lastDateShown=null;
      document.getElementById('msgsList').innerHTML='';
      m.messages.forEach(x=>{
        if(x.type==='system') addSys(x.message);
        else addMsg({id:x.id,u:x.username,txt:x.message,d:new Date(x.createdDate),own:x.username.toLowerCase()===user.toLowerCase(),skip:true,reactions:x.reactions||{},subtype:x.subtype||'text'});
      });
      scrollBot();break;
    case'message':addMsg({id:m.id,u:m.username,txt:m.message,d:new Date(m.createdDate),own:m.username.toLowerCase()===user.toLowerCase(),reactions:m.reactions||{},subtype:m.subtype||'text'});clrTypFor(m.username);break;
    case'system':addSys(m.text);break;
    case'online':
      document.getElementById('onlineCount').textContent=m.count;
      document.getElementById('onlineCount2').textContent=m.count;break;
    case'typing':showTypFor(m.username);break;
    case'reactions_update':{
      const rc=document.getElementById('rc-'+m.msgId);
      if(rc)renderReactions(rc,m.reactions,m.msgId);
      break;
    }
    case'name_taken':
      if(wsOk===false||!client_joined){
        // Chưa join xong → quay về login
        const ee=document.getElementById('loginErr');
        ee.textContent=`Tên "${m.name}" đã có người dùng, chọn tên khác!`;
        ee.style.display='block';
        document.getElementById('uInput').classList.add('err');
        document.getElementById('chatScreen').classList.add('hidden');
        document.getElementById('loginScreen').classList.remove('hidden');
        if(ws){try{ws.close()}catch(_){}}
        ws=null;wsOk=false;
      } else {
        // Đang chat → đổi tên bị trùng, hiện lỗi trong modal
        document.getElementById('rErr').textContent=`Tên "${m.name}" đã có người dùng!`;
        document.getElementById('rErr').style.display='block';
        document.getElementById('rInput').classList.add('err');
      }
      break;
  }
}

async function doSend(){
  await unlockAudio();
  const inp=document.getElementById('msgInput');
  let txt=inp.value.trim();
  if(!wsOk||!txt)return;
  if(txt.startsWith('/nick ')){
    const nn=txt.slice(6).trim();
    inp.value='';
    if(nn&&nn!==user){
      const err=valNick(nn);
      if(err){addSys(err);return}
      user=nn;saveU(nn);
      document.getElementById('headerUser').textContent=nn;
      if(wsOk)ws.send(JSON.stringify({type:'rename',newName:nn}));
      toast(`RENAMED TO: ${nn}`);
    }
    return;
  }
  inp.value='';
  ws.send(JSON.stringify({type:'message',message:txt}));
  pSend();
}

function onType(){
  if(!wsOk||typTimer)return;
  ws.send(JSON.stringify({type:'typing'}));
  typTimer=setTimeout(()=>{typTimer=null},2000);
}

function showTypFor(u){typActive.add(u);renderTyp();if(typClear[u])clearTimeout(typClear[u]);typClear[u]=setTimeout(()=>clrTypFor(u),3000)}
function clrTypFor(u){typActive.delete(u);delete typClear[u];renderTyp()}
function renderTyp(){
  const el=document.getElementById('typBar');
  const oth=[...typActive].filter(x=>x!==user);
  el.textContent=oth.length?`▸ ${oth[0]} is typing...`:'';
}

function openRename(){
  document.getElementById('rInput').value=user;
  document.getElementById('rErr').style.display='none';
  document.getElementById('rInput').classList.remove('err');
  document.getElementById('rModal').classList.add('show');
  setTimeout(()=>document.getElementById('rInput').focus(),100);
}
function closeRename(){document.getElementById('rModal').classList.remove('show')}
function confirmRename(){
  const raw=document.getElementById('rInput').value;
  const err=valNick(raw);
  const ee=document.getElementById('rErr'),ie=document.getElementById('rInput');
  if(err){ee.textContent=err;ee.style.display='block';ie.classList.add('err');return}
  const nn=raw.trim();
  if(nn===user){closeRename();return}
  user=nn;saveU(nn);
  document.getElementById('headerUser').textContent=nn;
  if(wsOk)ws.send(JSON.stringify({type:'rename',newName:nn}));
  toast(`RENAMED TO: ${nn}`);
  closeRename();
}

let lastDateShown = null;

function fmtDate(d){
  const today = new Date();
  const yesterday = new Date(today);
  yesterday.setDate(today.getDate()-1);
  const ds = d.toDateString();
  if(ds === today.toDateString()) return 'Hôm nay';
  if(ds === yesterday.toDateString()) return 'Hôm qua';
  return d.toLocaleDateString('vi-VN',{weekday:'long',day:'numeric',month:'numeric',year:'numeric'});
}

function maybeShowDate(d){
  const ds = d.toDateString();
  if(ds === lastDateShown) return;
  lastDateShown = ds;
  const list = document.getElementById('msgsList');
  const div = document.createElement('div');
  div.className = 'msg-date';
  div.textContent = fmtDate(d);
  list.appendChild(div);
}

function addSys(text){
  const list=document.getElementById('msgsList');
  const d=document.createElement('div');d.className='msg-sys';
  d.textContent=`— ${text} —`;list.appendChild(d);
  if(atBottom)scrollBot();
}

function addMsg({id,u,txt,d,own,skip=false,reactions={},subtype='text'}){
  maybeShowDate(d);
  const list=document.getElementById('msgsList');
  const row=document.createElement('div');
  row.className=`msg-row ${own?'own':'other'}`;

  const av=document.createElement('div');
  av.className='msg-avatar';
  av.textContent=avatarLetter(u);
  av.style.background=avatarColor(u);
  av.style.color='#0a0c1a';

  const body=document.createElement('div');body.className='msg-body';

  const meta=document.createElement('div');meta.className='msg-meta';
  const name=document.createElement('span');name.className='msg-name';
  name.textContent=own?'YOU':u.toUpperCase();
  name.style.color=own?'#b48ef4':avatarColor(u);
  const time=document.createElement('span');time.className='msg-time';time.textContent=fmt(d);
  meta.appendChild(name);meta.appendChild(time);

  // Bubble wrap with hover toolbar
  const bwrap=document.createElement('div');bwrap.className='bubble-wrap';

  // Quick react toolbar
  const toolbar=document.createElement('div');toolbar.className='react-toolbar';
  QUICK_REACTS.forEach(em=>{
    const btn=document.createElement('button');btn.className='react-quick-btn';
    btn.textContent=em;btn.title=em;
    btn.onclick=e=>{
      e.stopPropagation();
      if(!id){console.warn('react: no msg id');return;}
      sendReact(id,em);
    };
    toolbar.appendChild(btn);
  });
  const moreBtn=document.createElement('button');moreBtn.className='react-more-btn';
  moreBtn.textContent='+';moreBtn.title='Thêm emoji';
  moreBtn.onclick=e=>{
    e.stopPropagation();
    if(!id){return;}
    openPicker(id,moreBtn);
  };
  toolbar.appendChild(moreBtn);

  if(subtype==='gif'){
    const gb=document.createElement('div');gb.className='gif-bubble';
    const img=document.createElement('img');img.src=txt;img.loading='lazy';img.alt='GIF';
    gb.appendChild(img);
    bwrap.appendChild(toolbar);bwrap.appendChild(gb);
  } else {
    const bubble=document.createElement('div');bubble.className='msg-bubble';bubble.textContent=txt;
    bwrap.appendChild(toolbar);bwrap.appendChild(bubble);
  }

  // Reactions row
  const rc=document.createElement('div');
  rc.className='reactions-row';
  rc.id='rc-'+id;
  renderReactions(rc,reactions,id);

  body.appendChild(meta);body.appendChild(bwrap);body.appendChild(rc);
  if(own){row.appendChild(body);row.appendChild(av);}
  else{row.appendChild(av);row.appendChild(body);}
  list.appendChild(row);

  if(own||atBottom)scrollBot(true);
  if(!skip&&!own)pNotif();
  if(!own&&!atBottom){newCount++;showBadge();}
}

function scrollBot(sm=false){
  const l=document.getElementById('msgsList');
  l.scrollTo({top:l.scrollHeight,behavior:sm?'smooth':'auto'});
  atBottom=true;
}
function showBadge(){
  rmBadge();
  const b=document.createElement('div');b.className='new-badge';b.id='nb';
  b.textContent=`▼ ${newCount} NEW MESSAGE${newCount>1?'S':''}`;
  b.onclick=()=>{scrollBot(true);rmBadge()};
  document.body.appendChild(b);
}
function rmBadge(){const b=document.getElementById('nb');if(b)b.remove()}
function toast(msg,ms=3000){
  const w=document.getElementById('toastWrap');
  const t=document.createElement('div');t.className='toast';
  t.textContent=msg;w.appendChild(t);
  setTimeout(()=>{t.style.transition='opacity .3s';t.style.opacity='0';setTimeout(()=>t.remove(),300)},ms);
}
</script>
</body>
</html>
