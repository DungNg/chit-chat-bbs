<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
<title>Chit-Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0f1117;
  --surface:   #1a1d27;
  --surface2:  #22263a;
  --border:    #2e3348;
  --accent:    #6c63ff;
  --accent2:   #ff6584;
  --green:     #43e97b;
  --text:      #e8eaf6;
  --text-dim:  #6b7280;
  --text-muted:#3d4461;
  --radius:    14px;
  --radius-sm: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
}

.screen {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  transition: opacity .25s, transform .25s;
}
.screen.hidden { opacity: 0; pointer-events: none; transform: scale(.98); }

/* ── LOGIN ── */
.login-wrap {
  width: 100%; max-width: 420px;
  padding: 24px;
}

.login-logo {
  text-align: center;
  margin-bottom: 32px;
}
.logo-icon {
  width: 64px; height: 64px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 20px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 28px;
  margin-bottom: 16px;
  box-shadow: 0 8px 32px rgba(108,99,255,.35);
}
.login-logo h1 {
  font-size: 26px; font-weight: 700;
  background: linear-gradient(135deg, #fff 30%, #a5b4fc);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; letter-spacing: -.5px;
}
.login-logo p { color: var(--text-dim); font-size: 14px; margin-top: 6px; }

.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  box-shadow: 0 20px 60px rgba(0,0,0,.4);
}

.field-label {
  font-size: 13px; font-weight: 600;
  color: var(--text-dim); letter-spacing: .04em;
  text-transform: uppercase; margin-bottom: 8px;
}

.field-input {
  width: 100%;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 15px; color: var(--text);
  outline: none;
  transition: border-color .2s, box-shadow .2s;
  caret-color: var(--accent);
}
.field-input::placeholder { color: var(--text-muted); }
.field-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,99,255,.18); }
.field-input.err { border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(255,101,132,.18); }

.err-msg { font-size: 12px; color: var(--accent2); margin-top: 6px; display: none; }

.login-btn {
  width: 100%; margin-top: 20px; padding: 13px;
  background: linear-gradient(135deg, var(--accent), #8b5cf6);
  border: none; border-radius: var(--radius-sm);
  color: #fff; font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 15px; font-weight: 600; cursor: pointer;
  transition: opacity .15s, transform .15s, box-shadow .15s;
  box-shadow: 0 4px 20px rgba(108,99,255,.4);
}
.login-btn:hover { opacity: .9; transform: translateY(-1px); }
.login-btn:active { transform: translateY(0); }

.login-note { text-align: center; margin-top: 16px; font-size: 12px; color: var(--text-muted); }
.login-note span { color: var(--green); }

/* ── CHAT ── */
.chat-layout { display: flex; flex-direction: column; height: 100vh; height: 100dvh; width: 100%; }

.chat-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  flex-shrink: 0; gap: 12px;
}
.header-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
.header-logo {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.header-title { font-size: 15px; font-weight: 700; color: var(--text); }
.header-sub { font-size: 12px; color: var(--text-dim); }
.online-dot {
  width: 7px; height: 7px; background: var(--green);
  border-radius: 50%; display: inline-block;
  box-shadow: 0 0 6px var(--green);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

.header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.user-chip {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 20px; padding: 5px 10px 5px 6px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: background .15s, border-color .15s;
  max-width: 140px;
}
.user-chip:hover { background: var(--border); border-color: var(--accent); }
.user-chip .avatar {
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.user-chip .uname { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }

.conn-banner {
  background: #3d1a1a; border-bottom: 1px solid #7f1d1d;
  color: #fca5a5; text-align: center; padding: 8px;
  font-size: 13px; font-weight: 500; display: none; flex-shrink: 0;
}
.conn-banner.show { display: block; }

.msgs-area {
  flex: 1; overflow-y: auto;
  padding: 16px 16px 8px;
  display: flex; flex-direction: column; gap: 2px;
}
.msgs-area::-webkit-scrollbar { width: 4px; }
.msgs-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.msg-sys {
  text-align: center; font-size: 11px; color: var(--text-muted);
  padding: 6px 0; font-family: 'DM Mono', monospace;
}

.msg-row { display: flex; gap: 8px; padding: 2px 0; max-width: 100%; }
.msg-row.own { flex-direction: row-reverse; }

.msg-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff;
  flex-shrink: 0; align-self: flex-end; margin-bottom: 2px;
}

.msg-body { display: flex; flex-direction: column; gap: 2px; max-width: 72%; }
.msg-row.own .msg-body { align-items: flex-end; }

.msg-meta { display: flex; align-items: center; gap: 6px; padding: 0 4px; }
.msg-row.own .msg-meta { flex-direction: row-reverse; }
.msg-name { font-size: 12px; font-weight: 600; color: var(--text-dim); }
.msg-time { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; }

.msg-bubble {
  padding: 9px 13px; border-radius: 16px;
  font-size: 14px; line-height: 1.5; word-break: break-word;
}
.msg-row.other .msg-bubble {
  background: var(--surface2); color: var(--text);
  border-bottom-left-radius: 4px;
}
.msg-row.own .msg-bubble {
  background: linear-gradient(135deg, var(--accent), #8b5cf6);
  color: #fff; border-bottom-right-radius: 4px;
}

.typing-bar {
  padding: 4px 16px 6px; font-size: 12px;
  color: var(--text-muted); min-height: 22px;
  flex-shrink: 0; font-style: italic;
}

.input-area {
  padding: 10px 12px 12px;
  background: var(--surface); border-top: 1px solid var(--border);
  flex-shrink: 0; position: sticky; bottom: 0;
}
.input-row {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 24px; padding: 6px 6px 6px 14px;
  transition: border-color .2s, box-shadow .2s;
}
.input-row:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,99,255,.12); }

.chat-input {
  flex: 1; background: none; border: none; outline: none;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 14px; color: var(--text); caret-color: var(--accent); min-width: 0;
}
.chat-input::placeholder { color: var(--text-muted); }

.send-btn {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent), #8b5cf6);
  border: none; border-radius: 50%; color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: opacity .15s, transform .15s;
  box-shadow: 0 2px 10px rgba(108,99,255,.4);
}
.send-btn:hover { opacity: .9; transform: scale(1.05); }
.send-btn:active { transform: scale(.95); }
.send-btn:disabled { opacity: .4; transform: none; cursor: default; }
.send-btn svg { width: 16px; height: 16px; fill: currentColor; }

.input-hint { text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 6px; }

.new-badge {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
  background: var(--accent); color: #fff;
  font-size: 12px; font-weight: 600; padding: 7px 16px;
  border-radius: 20px; cursor: pointer; z-index: 100;
  box-shadow: 0 4px 20px rgba(108,99,255,.5);
  white-space: nowrap; animation: slideUp .2s ease;
}
@keyframes slideUp { from { transform: translateX(-50%) translateY(10px); opacity: 0; } }

.toast-wrap { position: fixed; bottom: 90px; right: 16px; display: flex; flex-direction: column; gap: 8px; z-index: 200; }
.toast {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); padding: 10px 14px; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500;
  box-shadow: 0 4px 20px rgba(0,0,0,.4); animation: slideUp .2s ease;
}

.modal-bg {
  position: fixed; inset: 0; background: rgba(0,0,0,.6);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  z-index: 300; opacity: 0; pointer-events: none;
  transition: opacity .2s; padding: 20px;
}
.modal-bg.show { opacity: 1; pointer-events: all; }
.modal-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 24px;
  width: 100%; max-width: 380px;
  box-shadow: 0 20px 60px rgba(0,0,0,.5);
  transform: scale(.95); transition: transform .2s;
}
.modal-bg.show .modal-box { transform: scale(1); }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.modal-sub { font-size: 13px; color: var(--text-dim); margin-bottom: 20px; }
.modal-actions { display: flex; gap: 8px; margin-top: 20px; }
.btn-cancel {
  flex: 1; padding: 10px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text-dim);
  font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: background .15s;
}
.btn-cancel:hover { background: var(--border); }
.btn-confirm {
  flex: 1; padding: 10px;
  background: linear-gradient(135deg, var(--accent), #8b5cf6);
  border: none; border-radius: var(--radius-sm); color: #fff;
  font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: opacity .15s;
}
.btn-confirm:hover { opacity: .9; }

@media (max-width: 600px) {
  .login-wrap { padding: 16px; }
  .login-card { padding: 20px; }
  .header-sub { display: none; }
  .msg-body { max-width: 82%; }
  .msgs-area { padding: 12px 12px 6px; }
  .input-area { padding: 8px 10px 10px; }
  .user-chip .uname { max-width: 80px; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="screen" id="loginScreen">
  <div class="login-wrap">
    <div class="login-logo">
      <div class="logo-icon">💬</div>
      <h1>Chit-Chat</h1>
      <p>Chat ẩn danh, không cần đăng ký</p>
    </div>
    <div class="login-card">
      <div class="field-label">Tên hiển thị</div>
      <input class="field-input" id="uInput" type="text" placeholder="Nhập tên của bạn..." maxlength="20" autocomplete="off" spellcheck="false" autocorrect="off"/>
      <div class="err-msg" id="loginErr"></div>
      <button class="login-btn" onclick="enterChat()">Vào chat →</button>
    </div>
    <div class="login-note">🔒 Không lưu IP &nbsp;·&nbsp; <span>Hoàn toàn ẩn danh</span></div>
  </div>
</div>

<!-- CHAT -->
<div class="screen hidden" id="chatScreen">
  <div class="chat-layout">

    <div class="chat-header">
      <div class="header-left">
        <div class="header-logo">💬</div>
        <div>
          <div class="header-title">Chit-Chat</div>
          <div class="header-sub"><span class="online-dot"></span>&nbsp;<span id="onlineCount">0</span> online</div>
        </div>
      </div>
      <div class="header-right">
        <div class="user-chip" onclick="openRename()" title="Đổi tên">
          <div class="avatar" id="headerAvatar">?</div>
          <span class="uname" id="headerUser">...</span>
        </div>
      </div>
    </div>

    <div class="conn-banner" id="connBanner">⚠️ Mất kết nối — đang kết nối lại...</div>

    <div class="msgs-area" id="msgsList"></div>

    <div class="typing-bar" id="typBar"></div>

    <div class="input-area">
      <div class="input-row">
        <input class="chat-input" id="msgInput" type="text" placeholder="Nhắn gì đó..." maxlength="500" autocomplete="off" spellcheck="false"/>
        <button class="send-btn" id="sendBtn">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
      <div class="input-hint">Gõ /nick TÊN để đổi tên &nbsp;·&nbsp; <span id="onlineCount2">0</span> người online</div>
    </div>

  </div>
</div>

<!-- RENAME MODAL -->
<div class="modal-bg" id="rModal">
  <div class="modal-box">
    <div class="modal-title">Đổi tên</div>
    <div class="modal-sub">Tên mới sẽ được cập nhật trong chat</div>
    <div class="field-label">Tên hiển thị</div>
    <input class="field-input" id="rInput" type="text" placeholder="Tên mới..." maxlength="20" autocomplete="off" spellcheck="false"/>
    <div class="err-msg" id="rErr"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeRename()">Huỷ</button>
      <button class="btn-confirm" onclick="confirmRename()">Xác nhận</button>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmt=d=>d.toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'});

let user='',ws=null,wsOk=false,rcTimer=null,typTimer=null;
let typClear={},typActive=new Set(),atBottom=true,newCount=0;
const WS=`${location.protocol==='https:'?'wss':'ws'}://${location.host}`;

const AVATAR_COLORS=['#6c63ff','#ff6584','#43e97b','#f7971e','#4facfe','#a18cd1','#fa709a','#fee140'];
function avatarColor(n){let h=0;for(const c of n)h=(h*31+c.charCodeAt(0))&0xffff;return AVATAR_COLORS[h%AVATAR_COLORS.length]}
function avatarLetter(n){return(n||'?')[0].toUpperCase()}

// ── AUDIO ──
let _actx=null,_audioUnlocked=false;
function _initCtx(){if(!_actx)_actx=new(window.AudioContext||window.webkitAudioContext)();}
async function unlockAudio(){
  try{
    _initCtx();
    if(_actx.state==='suspended')await _actx.resume();
    const buf=_actx.createBuffer(1,1,22050);
    const src=_actx.createBufferSource();
    src.buffer=buf;src.connect(_actx.destination);src.start(0);
    _audioUnlocked=true;
  }catch(_){}
}
function beep8(notes){
  if(!_actx||!_audioUnlocked)return;
  try{
    notes.forEach(([f,t,d])=>{
      const o=_actx.createOscillator(),g=_actx.createGain();
      o.connect(g);g.connect(_actx.destination);
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(.04,_actx.currentTime+t);
      g.gain.setValueAtTime(.001,_actx.currentTime+t+d);
      o.start(_actx.currentTime+t);o.stop(_actx.currentTime+t+d+.01);
    });
  }catch(_){}
}
const pNotif=()=>beep8([[880,.0,.05],[1047,.06,.05]]);
const pJoin =()=>beep8([[523,.0,.08],[659,.09,.08],[784,.18,.12]]);
const pSend =()=>beep8([[880,.0,.04],[1047,.05,.04]]);

const saveU=n=>{try{localStorage.setItem('cc_nick',n)}catch(_){}};
const loadU=()=>{try{return localStorage.getItem('cc_nick')||''}catch(_){return''}};

window.onload=()=>{
  const sv=loadU();if(sv)document.getElementById('uInput').value=sv;
  document.getElementById('uInput').addEventListener('keydown',e=>{if(e.key==='Enter')enterChat()});
  document.getElementById('msgInput').addEventListener('keydown',e=>{if(e.key==='Enter'){doSend();return}});
  document.getElementById('msgInput').addEventListener('input',onType);
  document.getElementById('rInput').addEventListener('keydown',e=>{if(e.key==='Enter')confirmRename()});
  document.getElementById('rModal').addEventListener('click',e=>{if(e.target.id==='rModal')closeRename()});
  document.getElementById('msgsList').addEventListener('scroll',function(){
    atBottom=this.scrollTop+this.clientHeight>=this.scrollHeight-80;
    if(atBottom){newCount=0;rmBadge()}
  });
  document.getElementById('sendBtn').addEventListener('touchend',e=>{e.preventDefault();doSend();},{passive:false});
  document.getElementById('sendBtn').addEventListener('click',doSend);
  document.addEventListener('touchend',unlockAudio,{once:true});
  document.addEventListener('touchstart',unlockAudio,{once:true});
};

function valNick(n){
  n=n.trim();
  if(!n)return'Tên không được để trống';
  if(n.length<2)return'Tên phải có ít nhất 2 ký tự';
  if(n.length>20)return'Tên tối đa 20 ký tự';
  return null;
}

function setAvatar(elId, name){
  const el=document.getElementById(elId);
  el.textContent=avatarLetter(name);
  el.style.background=`linear-gradient(135deg,${avatarColor(name)},${avatarColor(name+'2')})`;
}

async function enterChat(){
  const raw=document.getElementById('uInput').value;
  const err=valNick(raw);
  const ee=document.getElementById('loginErr'),ie=document.getElementById('uInput');
  if(err){ee.textContent=err;ee.style.display='block';ie.classList.add('err');return}
  ee.style.display='none';ie.classList.remove('err');
  user=raw.trim();saveU(user);
  setAvatar('headerAvatar',user);
  document.getElementById('headerUser').textContent=user;
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('chatScreen').classList.remove('hidden');
  connectWS();
  await unlockAudio();
  pJoin();
}

function connectWS(){
  if(ws){try{ws.close()}catch(_){}}
  ws=new WebSocket(WS);
  ws.addEventListener('open',()=>{
    wsOk=true;setConn(true);
    ws.send(JSON.stringify({type:'join',username:user}));
    if(rcTimer){clearTimeout(rcTimer);rcTimer=null}
  });
  ws.addEventListener('message',e=>{let m;try{m=JSON.parse(e.data)}catch{return}onMsg(m)});
  ws.addEventListener('close',()=>{wsOk=false;setConn(false);schedRC()});
  ws.addEventListener('error',()=>{wsOk=false;setConn(false)});
}
function schedRC(){if(rcTimer)return;rcTimer=setTimeout(()=>{rcTimer=null;connectWS()},3000)}
function setConn(ok){
  document.getElementById('connBanner').classList.toggle('show',!ok);
  document.getElementById('msgInput').disabled=!ok;
  document.getElementById('sendBtn').disabled=!ok;
}

function onMsg(m){
  switch(m.type){
    case'history':
      document.getElementById('msgsList').innerHTML='';
      m.messages.forEach(x=>addMsg({u:x.username,txt:x.message,d:new Date(x.createdDate),own:x.username===user,skip:true}));
      scrollBot();break;
    case'message':addMsg({u:m.username,txt:m.message,d:new Date(m.createdDate),own:m.username===user});clrTypFor(m.username);break;
    case'system':addSys(m.text);break;
    case'online':
      document.getElementById('onlineCount').textContent=m.count;
      document.getElementById('onlineCount2').textContent=m.count;break;
    case'typing':showTypFor(m.username);break;
  }
}

async function doSend(){
  await unlockAudio();
  const inp=document.getElementById('msgInput');
  let txt=inp.value.trim();
  if(!wsOk||!txt)return;
  if(txt.startsWith('/nick ')){
    const nn=txt.slice(6).trim();
    inp.value='';
    if(nn&&nn!==user){
      const err=valNick(nn);
      if(err){addSys(err);return}
      const old=user;user=nn;saveU(nn);
      setAvatar('headerAvatar',user);
      document.getElementById('headerUser').textContent=nn;
      if(wsOk)ws.send(JSON.stringify({type:'rename',newName:nn}));
      toast(`Đã đổi tên thành "${nn}"`);
    }
    return;
  }
  inp.value='';
  ws.send(JSON.stringify({type:'message',message:txt}));
  pSend();
}

function onType(){
  if(!wsOk||typTimer)return;
  ws.send(JSON.stringify({type:'typing'}));
  typTimer=setTimeout(()=>{typTimer=null},2000);
}

function showTypFor(u){typActive.add(u);renderTyp();if(typClear[u])clearTimeout(typClear[u]);typClear[u]=setTimeout(()=>clrTypFor(u),3000)}
function clrTypFor(u){typActive.delete(u);delete typClear[u];renderTyp()}
function renderTyp(){
  const el=document.getElementById('typBar');
  const oth=[...typActive].filter(x=>x!==user);
  el.textContent=oth.length?`${oth[0]} đang nhập...`:'';
}

function openRename(){
  document.getElementById('rInput').value=user;
  document.getElementById('rErr').style.display='none';
  document.getElementById('rInput').classList.remove('err');
  document.getElementById('rModal').classList.add('show');
  setTimeout(()=>document.getElementById('rInput').focus(),100);
}
function closeRename(){document.getElementById('rModal').classList.remove('show')}
function confirmRename(){
  const raw=document.getElementById('rInput').value;
  const err=valNick(raw);
  const ee=document.getElementById('rErr'),ie=document.getElementById('rInput');
  if(err){ee.textContent=err;ee.style.display='block';ie.classList.add('err');return}
  const nn=raw.trim();
  if(nn===user){closeRename();return}
  user=nn;saveU(nn);
  setAvatar('headerAvatar',user);
  document.getElementById('headerUser').textContent=nn;
  if(wsOk)ws.send(JSON.stringify({type:'rename',newName:nn}));
  toast(`Đã đổi tên thành "${nn}"`);
  closeRename();
}

function addSys(text){
  const list=document.getElementById('msgsList');
  const d=document.createElement('div');d.className='msg-sys';
  d.textContent=text;list.appendChild(d);
  if(atBottom)scrollBot();
}

function addMsg({u,txt,d,own,skip=false}){
  const list=document.getElementById('msgsList');
  const row=document.createElement('div');
  row.className=`msg-row ${own?'own':'other'}`;

  const av=document.createElement('div');
  av.className='msg-avatar';
  av.textContent=avatarLetter(u);
  av.style.background=`linear-gradient(135deg,${avatarColor(u)},${avatarColor(u+'2')})`;

  const body=document.createElement('div');body.className='msg-body';

  const meta=document.createElement('div');meta.className='msg-meta';
  const name=document.createElement('span');name.className='msg-name';name.textContent=own?'Bạn':u;
  const time=document.createElement('span');time.className='msg-time';time.textContent=fmt(d);
  meta.appendChild(name);meta.appendChild(time);

  const bubble=document.createElement('div');bubble.className='msg-bubble';bubble.textContent=txt;

  body.appendChild(meta);body.appendChild(bubble);
  if(own){row.appendChild(body);row.appendChild(av);}
  else{row.appendChild(av);row.appendChild(body);}
  list.appendChild(row);

  if(own||atBottom)scrollBot(true);
  if(!skip&&!own)pNotif();
  if(!own&&!atBottom){newCount++;showBadge();}
}

function scrollBot(sm=false){
  const l=document.getElementById('msgsList');
  l.scrollTo({top:l.scrollHeight,behavior:sm?'smooth':'auto'});
  atBottom=true;
}
function showBadge(){
  rmBadge();
  const b=document.createElement('div');b.className='new-badge';b.id='nb';
  b.textContent=`↓ ${newCount} tin nhắn mới`;
  b.onclick=()=>{scrollBot(true);rmBadge()};
  document.body.appendChild(b);
}
function rmBadge(){const b=document.getElementById('nb');if(b)b.remove()}
function toast(msg,ms=3000){
  const w=document.getElementById('toastWrap');
  const t=document.createElement('div');t.className='toast';
  t.textContent=msg;w.appendChild(t);
  setTimeout(()=>{t.style.transition='opacity .3s';t.style.opacity='0';setTimeout(()=>t.remove(),300)},ms);
}
</script>
</body>
</html>
